<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <filter id="textShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  
  <rect width="100" height="100" fill="url(#bgGradient)" rx="16"/>

 
  <text x="50" y="65" font-family="Georgia, serif" font-size="38"
        font-weight="bold" text-anchor="middle" fill="white"
        filter="url(#textShadow)">&lt;/K&gt;</text>
</svg>
